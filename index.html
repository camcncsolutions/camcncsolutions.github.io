<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAM CNC SOLUTIONS</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #000;
            position: relative;
            z-index: 102;
        }

        /* Контейнер для четкого встроенного логотипа */
        .logo-container {
            display: flex;
            align-items: center;
            width: 260px; /* Фиксированная ширина как на макете */
            height: auto;
        }

        .logo-container svg {
            width: 100%;
            height: auto;
        }

        .nav-desktop {
            display: flex;
            gap: 30px;
        }

        .nav-desktop a {
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-desktop a:hover {
            color: #4d4dff;
        }

        .burger-menu {
            display: none;
            cursor: pointer;
            background: none;
            border: none;
            flex-direction: column;
            gap: 6px;
            z-index: 103;
        }

        .burger-menu span {
            display: block;
            width: 30px;
            height: 3px;
            background-color: #fff;
            transition: all 0.3s ease;
        }

        .burger-menu.open span:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }
        .burger-menu.open span:nth-child(2) {
            opacity: 0;
        }
        .burger-menu.open span:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        .nav-mobile {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            transition: top 0.4s ease;
            z-index: 101;
        }

        .nav-mobile.open {
            top: 0;
        }

        .nav-mobile a {
            color: #fff;
            text-decoration: none;
            font-size: 32px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-mobile a:hover {
            color: #4d4dff;
        }

        .hero-section {
            padding: 100px 40px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .nav-desktop {
                display: none;
            }

            .burger-menu {
                display: flex;
            }
            
            header {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <svg viewBox="0 0 330 85" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="52" y="2" width="270" height="46" fill="#4d4dff"/>
                <text x="66" y="31" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="19" font-weight="bold" letter-spacing="1">CAM CNC SOLUTIONS</text>
                
                <rect x="2" y="2" width="46" height="46" stroke="#4d4dff" stroke-width="3"/>
                <path d="M10 38 L10 18 L24 18 L24 28 L40 28 L40 38 Z" fill="none" stroke="#4d4dff" stroke-width="2.5"/>
                <circle cx="17" cy="25" r="2" fill="#4d4dff"/>
                <line x1="28" y1="18" x2="36" y2="18" stroke="#4d4dff" stroke-width="2.5"/>
                <line x1="10" y1="33" x2="40" y2="33" stroke="#4d4dff" stroke-width="1"/>
                
                <text x="56" y="68" fill="#4d4dff" font-family="'Segoe UI', sans-serif" font-size="12.5" font-weight="600" letter-spacing="0.3">Экспертные решения для станков с ЧПУ</text>
            </svg>
        </div>

        <nav class="nav-desktop">
            <a href="#about">О компании</a>
            <a href="#services">Услуги</a>
            <a href="#cases">Кейсы</a>
            <a href="#contacts">Контакты</a>
        </nav>

        <button class="burger-menu" id="burgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <nav class="nav-mobile" id="mobileMenu">
        <a href="#about" onclick="toggleMenu()">О компании</a>
        <a href="#services" onclick="toggleMenu()">Услуги</a>
        <a href="#cases" onclick="toggleMenu()">Кейсы</a>
        <a href="#contacts" onclick="toggleMenu()">Контакты</a>
    </nav>

    <main class="hero-section">
        <h1>Инженерный консалтинг для производств</h1>
        <p>Экспертные решения для станков с ЧПУ.</p>
    </main>

    <script>
        const burgerBtn = document.getElementById('burgerBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        function toggleMenu() {
            burgerBtn.classList.toggle('open');
            mobileMenu.classList.toggle('open');
            document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : 'auto';
        }

        burgerBtn.addEventListener('click', toggleMenu);
    </script>

</body>
</html>
