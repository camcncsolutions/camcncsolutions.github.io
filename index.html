<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAM CNC SOLUTIONS</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #000;
            position: relative;
            z-index: 102;
        }

        /* Контейнер для оригинального логотипа */
        .logo-container {
            display: flex;
            align-items: center;
            width: 280px; /* Оптимальная ширина под пропорции оригинала */
            height: auto;
            background-color: #fff; /* Создаем белую подложку ТОЛЬКО под размеры самого логотипа */
            padding: 5px;
            border-radius: 4px;
        }

        .logo-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .nav-desktop {
            display: flex;
            gap: 30px;
        }

        .nav-desktop a {
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-desktop a:hover {
            color: #4d4dff;
        }

        .burger-menu {
            display: none;
            cursor: pointer;
            background: none;
            border: none;
            flex-direction: column;
            gap: 6px;
            z-index: 103;
        }

        .burger-menu span {
            display: block;
            width: 30px;
            height: 3px;
            background-color: #fff;
            transition: all 0.3s ease;
        }

        .burger-menu.open span:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }
        .burger-menu.open span:nth-child(2) {
            opacity: 0;
        }
        .burger-menu.open span:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        .nav-mobile {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            transition: top 0.4s ease;
            z-index: 101;
        }

        .nav-mobile.open {
            top: 0;
        }

        .nav-mobile a {
            color: #fff;
            text-decoration: none;
            font-size: 32px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-mobile a:hover {
            color: #4d4dff;
        }

        .hero-section {
            padding: 100px 40px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .nav-desktop {
                display: none;
            }

            .burger-menu {
                display: flex;
            }
            
            header {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo_white_back.svg" alt="CAM CNC SOLUTIONS" class="logo-img">
        </div>

        <nav class="nav-desktop">
            <a href="#about">О компании</a>
            <a href="#services">Услуги</a>
            <a href="#cases">Кейсы</a>
            <a href="#contacts">Контакты</a>
        </nav>

        <button class="burger-menu" id="burgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <nav class="nav-mobile" id="mobileMenu">
        <a href="#about" onclick="toggleMenu()">О компании</a>
        <a href="#services" onclick="toggleMenu()">Услуги</a>
        <a href="#cases" onclick="toggleMenu()">Кейсы</a>
        <a href="#contacts" onclick="toggleMenu()">Контакты</a>
    </nav>

    <main class="hero-section">
        <h1>Инженерный консалтинг для производств</h1>
        <p>Экспертные решения для станков с ЧПУ.</p>
    </main>

    <script>
        const burgerBtn = document.getElementById('burgerBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        function toggleMenu() {
            burgerBtn.classList.toggle('open');
            mobileMenu.classList.toggle('open');
            document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : 'auto';
        }

        burgerBtn.addEventListener('click', toggleMenu);
    </script>

</body>
</html>
